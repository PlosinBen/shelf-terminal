name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Gate the release on typecheck + unit tests. e2e is verified locally before
  # tagging (per CLAUDE.md workflow) — running it here would add ~4min for
  # limited value since the local run is the canonical check.
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: npm

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install setuptools (needed by node-gyp for node-pty)
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

  build:
    needs: test
    # Serialize the platform builds. Each electron-builder publish does a
    # non-atomic find-or-create of the draft release for this tag; running
    # mac/win/linux in parallel makes them race and create duplicate drafts
    # with the installers + auto-update latest*.yml split across them, leaving
    # neither publishable. With max-parallel 1 the first job creates the draft
    # and the rest find it and only upload. Uses electron-builder's native
    # GitHub publish (GH_TOKEN) — no gh CLI or extra tooling. Cost: ~3x wall
    # clock vs parallel.
    strategy:
      max-parallel: 1
      # One platform's failure must not cancel the others — each produces an
      # independent installer for the same draft release.
      fail-fast: false

      matrix:
        include:
          - os: macos-latest
            platform: mac
          # Pin windows-2022: GitHub is redirecting `windows-latest` to the
          # windows-2025 image, whose Visual Studio layout node-gyp can't find
          # ("Could not find any Visual Studio installation to use"), breaking
          # the node-pty native rebuild. windows-2022 ships VS2022 that node-gyp
          # detects.
          - os: windows-2022
            platform: win
          - os: ubuntu-22.04
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: npm

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install setuptools (needed by node-gyp for node-pty)
        run: pip install setuptools

      - name: Install fuse (Linux AppImage)
        if: matrix.platform == 'linux'
        run: sudo apt-get install -y libfuse2

      - name: Install dependencies
        run: npm ci

      - name: Install cross-platform Claude SDK binary (WSL support)
        if: matrix.platform == 'win'
        run: npm install --no-save --force @anthropic-ai/claude-agent-sdk-linux-x64@$(node -p "require('./node_modules/@anthropic-ai/claude-agent-sdk-win32-x64/package.json').version")

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist:${{ matrix.platform }}
