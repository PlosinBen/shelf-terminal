name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Gate the release on typecheck + unit tests. e2e is verified locally before
  # tagging (per CLAUDE.md workflow) — running it here would add ~4min for
  # limited value since the local run is the canonical check.
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: npm

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install setuptools (needed by node-gyp for node-pty)
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

  # Create the draft release ONCE, before the platform matrix fans out. The
  # three electron-builder jobs run in parallel; each one's "find-or-create
  # release for this tag" is not atomic, so without a pre-existing draft they
  # race and each creates its own — producing duplicate drafts with the
  # platform assets (and the auto-update latest*.yml files) split across them,
  # leaving neither publishable. With the draft already present, every builder
  # finds it and only uploads. Idempotent so re-runs reuse the same draft.
  create_release:
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure a single draft release exists for this tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Draft release $VERSION already exists — reusing."
          else
            gh release create "$VERSION" \
              --draft \
              --title "${VERSION#v}" \
              --notes "$(git tag -l --format='%(contents)' "$VERSION")"
          fi

  build:
    needs: create_release
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-22.04
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: npm

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install setuptools (needed by node-gyp for node-pty)
        run: pip install setuptools

      - name: Install fuse (Linux AppImage)
        if: matrix.platform == 'linux'
        run: sudo apt-get install -y libfuse2

      - name: Install dependencies
        run: npm ci

      - name: Install cross-platform Claude SDK binary (WSL support)
        if: matrix.platform == 'win'
        run: npm install --no-save --force @anthropic-ai/claude-agent-sdk-linux-x64@$(node -p "require('./node_modules/@anthropic-ai/claude-agent-sdk-win32-x64/package.json').version")

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist:${{ matrix.platform }}
