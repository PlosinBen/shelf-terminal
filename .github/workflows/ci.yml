name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: npm

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install setuptools (needed by node-gyp for node-pty)
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:unit

  windows:
    needs: unit-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: npm

      - name: Setup Python for node-gyp
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install setuptools (needed by node-gyp for node-pty)
        run: pip install setuptools

      - name: Install dependencies
        run: npm ci

      - name: Install cross-platform Claude SDK binary (WSL support)
        run: npm install --no-save --force @anthropic-ai/claude-agent-sdk-linux-x64@$(node -p "require('./node_modules/@anthropic-ai/claude-agent-sdk-win32-x64/package.json').version")
        shell: bash

      - name: Unit tests
        run: npm run test:unit

      - name: Pack (electron-builder --dir)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run pack

      - name: Verify packed output contains linux-x64 Claude SDK binary
        run: |
          if (!(Test-Path "release\win-unpacked\resources\app.asar.unpacked\node_modules\@anthropic-ai\claude-agent-sdk-linux-x64")) {
            Write-Error "linux-x64 Claude SDK binary missing from packed output"
            exit 1
          }
          Write-Host "linux-x64 Claude SDK binary found"
